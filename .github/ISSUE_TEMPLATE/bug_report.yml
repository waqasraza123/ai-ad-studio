name: Bug report
description: Report a reproducible bug in AI Ad Studio
title: "[Bug]: "
labels: ["bug"]
body:

type: textarea
id: summary
attributes:
label: Summary
description: What is broken?
placeholder: A clear and concise description of the bug.
validations:
required: true

type: textarea
id: steps
attributes:
label: Steps to reproduce
description: How can this be reproduced?
placeholder: |
  1. Go to ...
  2. Click ...
  3. Observe ...
validations:
required: true

type: textarea
id: expected
attributes:
label: Expected behavior
placeholder: What should have happened?
validations:
required: true

type: textarea
id: actual
attributes:
label: Actual behavior
placeholder: What happened instead?
validations:
required: true

type: textarea
id: context
attributes:
label: Environment and context
description: Browser, OS, runtime, logs, screenshots, related project state.
placeholder: Add anything useful for reproduction.

