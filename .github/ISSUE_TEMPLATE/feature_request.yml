name: Feature request
description: Suggest an improvement for AI Ad Studio
title: "[Feature]: "
labels: ["enhancement"]
body:

type: textarea
id: problem
attributes:
label: Problem
description: What problem are you trying to solve?
placeholder: Describe the pain point.
validations:
required: true

type: textarea
id: proposal
attributes:
label: Proposed solution
description: What would you like to happen?
placeholder: Describe the change you want.
validations:
required: true

type: textarea
id: alternatives
attributes:
label: Alternatives considered
placeholder: List any alternatives or workarounds you considered.

type: textarea
id: context
attributes:
label: Additional context
placeholder: Add examples, screenshots, workflow notes, or constraints.

